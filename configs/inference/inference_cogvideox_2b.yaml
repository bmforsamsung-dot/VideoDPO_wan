model:
  model_path: THUDM/CogVideoX-2b
  ckpt_path: ""  # e.g. results/dpo-cogvideox/your_exp/checkpoints/last.ckpt

inference:
  prompt_file: prompts/test_prompts.txt
  savedir: results/cogvideox_2b
  height: 480
  width: 720
  num_frames: 49
  num_inference_steps: 50
  guidance_scale: 6.0
  num_videos_per_prompt: 1
  fps: 8
  dtype: bf16
  device: cuda
  enable_model_cpu_offload: false
  enable_slicing: true
  enable_tiling: true
